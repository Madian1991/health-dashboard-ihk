<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login — ProjectHub</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-box">
    <h2>ProjectHub Login</h2>

    <input id="username" type="text" placeholder="Benutzername">
    <input id="password" type="password" placeholder="Passwort">

    <button onclick="login()">Login</button>

    <p id="error" class="error"></p>
</div>

<script>
    function login(){
        const u=document.getElementById("username").value;
        const p=document.getElementById("password").value;

        if(u==="admin" && p==="1234"){
            // تخزين دخول المستخدم
            localStorage.setItem("loggedIn", true);
            window.location.href="index.html";   // ← يفتح الداشبورد
        } else {
            document.getElementById("error").innerText="Falsche Zugangsdaten!";
        }
    }
</script>

</body>
</html>
